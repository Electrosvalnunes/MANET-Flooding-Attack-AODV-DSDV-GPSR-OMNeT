[General]
#abstract-config = true (requires omnet 7)
sim-time-limit = 900s
warmup-period = 150s

## --- APLICAÇÃO UDP CBR (substitui o PingApp) ---
*.source.numApps = 1
*.source.app[0].typename = "UdpBasicApp"
*.source.app[0].destAddresses = "destination"
*.source.app[0].destPort = 5000
# Tráfego CBR (ajuste à vontade)
*.source.app[0].sendInterval = 0.2s        # 5 pps
*.source.app[0].messageLength = 256B        # 256 bytes por pacote
*.source.app[0].startTime = uniform(152s,158s)  # arranque aleatório leve

*.destination.numApps = 1
*.destination.app[0].typename = "UdpSink"
*.destination.app[0].localPort = 5000

# --- Visualização: mostre rotas para pacotes UDP (não mais ping) ---
*.visualizer.*.networkRouteVisualizer[0].displayRoutes = true
*.visualizer.*.networkRouteVisualizer[0].packetFilter = "UDP*"
# (se quiser, pode também destacar ligações de dados UDP)
# *.visualizer.*.dataLinkVisualizer[1].packetFilter = "UDP*"


# --- gravação global ---
**.vector-recording = true
**.scalar-recording = true

# --- repetições p/ IC95% (ajuste) ---
repeat = 10
seed-set = ${repetition}

# --- Métricas UDP (PDR, delay, throughput) ---
# PDR = rcvd / sent
*.source.app[0].sentPk:count.scalar-recording = true
*.destination.app[0].rcvdPk:count.scalar-recording = true
# (compat: se sua versão usar nomes "packetSent/packetReceived", ative também:)
*.source.app[0].packetSent:count.scalar-recording = true
*.destination.app[0].packetReceived:count.scalar-recording = true



# --- Overhead de controle de roteamento (genérico) ---
# Protocolos que usam 'routingApp' (AODV) e os que usam 'routing' (DSDV/GPSR)
*.*.routingApp.packetSent:count.scalar-recording = true
*.*.routingApp.packetReceived:count.scalar-recording = true
*.*.routing.packetSent:count.scalar-recording = true
*.*.routing.packetReceived:count.scalar-recording = true



# data link visualizer
*.visualizer.*.numDataLinkVisualizers = 5
*.visualizer.*.dataLinkVisualizer[*].activityLevel = "peer"
*.visualizer.*.dataLinkVisualizer[*].displayLinks = true
*.visualizer.*.dataLinkVisualizer[0].packetFilter = "aodv::Rreq or GPSRBeacon"
*.visualizer.*.dataLinkVisualizer[1].packetFilter = "ping* or UDP*"
*.visualizer.*.dataLinkVisualizer[1].*Color = "blue"
*.visualizer.*.dataLinkVisualizer[2].packetFilter = "aodv::Rrep"
*.visualizer.*.dataLinkVisualizer[2].*Color = "darkslategray"
*.visualizer.*.dataLinkVisualizer[3].packetFilter = "aodv::Rerr"
*.visualizer.*.dataLinkVisualizer[3].*Color = "red"
*.visualizer.*.dataLinkVisualizer[4].packetFilter = "Hello"
*.visualizer.*.dataLinkVisualizer[4].*Color = "green"

# uncomment for video recording
#*.visualizer.*.networkRouteVisualizer[0].fadeOutMode = "animationTime"
#*.visualizer.*.dataLinkVisualizer[*].fadeOutMode = "animationTime"

# misc
**.wlan[*].bitrate = 24Mbps
*.configurator.addStaticRoutes = false
**.netmaskRoutes = ""
**.arp.typename = "GlobalArp"

[Config MobileNodesBase]
network = MANETs_Electrosvalnunes1
#abstract-config = true (requires omnet 7)

# tx power
**.transmitter.power = 5mW #1mW

# node movement
*.node*.mobility.typename = "LinearMobility"
*.node*.mobility.initialMovementHeading = uniform(0deg,360deg)
*.node*.mobility.speed = 25mps

**.constraintAreaMaxX = 800m
**.constraintAreaMaxY = 650m
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m

**.residualEnergyCapacity:last.scalar-recording = true
# visualization
*.visualizer.*.routingTableVisualizer[0].displayLabels = false
*.visualizer.*.routingTableVisualizer[0].displayRoutesIndividually = false
*.visualizer.*.routingTableVisualizer[0].lineShift = 0

*.visualizer.*.networkRouteVisualizer[0].displayRoutes = true
*.visualizer.*.networkRouteVisualizer[0].packetFilter = "*ping*"

*.visualizer.*.interfaceTableVisualizer[0].displayInterfaceTables = true
*.visualizer.*.interfaceTableVisualizer[0].format = "%a/%l"

[Config Aodv]
extends = MobileNodesBase

# routing protocol parameters
*.*.routingApp.typename = "Aodv"

*.*.routingApp.activeRouteTimeout = 1s
*.*.routingApp.deletePeriod = 0.5s

**.vector-recording = true
**.packetReceived:count.scalar-recording = true
**.residualEnergyCapacity:last.scalar-recording = true
*.server.app[0].endToEndDelay:mean.scalar-recording = true

# visualization
*.visualizer.*.routingTableVisualizer[0].displayRoutingTables = true
*.visualizer.*.routingTableVisualizer[0].destinationFilter = "destination"



# AODV – mensagens de controle
*.*.routingApp.sentRreq:count.scalar-recording = true
*.*.routingApp.sentRrep:count.scalar-recording = true
*.*.routingApp.sentRerr:count.scalar-recording = true
*.*.routingApp.rcvdRreq:count.scalar-recording = true
*.*.routingApp.rcvdRrep:count.scalar-recording = true
*.*.routingApp.rcvdRerr:count.scalar-recording = true


[Config Dsdv]
extends = MobileNodesBase

# routing protocol
*.*.routing.typename = "Dsdv"

*.*.routing.helloInterval = 1s
*.*.routing.routeLifetime = 2s

# ping app
*.source.app[0].sendInterval = 0.5s

# visualization
*.visualizer.*.routingTableVisualizer[0].displayRoutingTables = true

# DSDV – mensagens de controle
*.*.routing.sentHello:count.scalar-recording = true
*.*.routing.rcvdHello:count.scalar-recording = true
*.*.routing.tableUpdate:count.scalar-recording = true




[Config Gpsr]
extends = MobileNodesBase

# routing protocol
*.*.routing.typename = "Gpsr"

**.planarizationMode = "RNG"

**.displayBubbles = true

# tx power
**.transmitter.power = 1.25mW

# visualization
*.visualizer.*.networkRouteVisualizer[0].displayRoutes = true
*.visualizer.*.networkRouteVisualizer[0].packetFilter = "*ping*"

**.displayCommunicationRanges = true
# GPSR – mensagens de controle
*.*.routing.sentBeacon:count.scalar-recording = true
*.*.routing.rcvdBeacon:count.scalar-recording = true
*.*.routing.perimeterModeEntered:count.scalar-recording = true
*.*.routing.perimeterModeExited:count.scalar-recording = true

# ============================================================
#  ATTACK FLOODING (portas separadas) — pronto para colar
#  Fluxo legítimo: 5000  |  Fluxo do ataque: 5001
#  Métricas (legítimo):
#    PDR_legit  = destination.app[0].packetReceived:count / source.app[0].packetSent:count
#    Thr_legit  = destination.app[0].packetReceived:count * 256 * 8 / 60
#    Delay_legit: destination.app[0].endToEndDelay:mean
# ============================================================

# ===================== AODV — EXTREME =====================
[Config AttackFloodingSplitPorts_Aodv_EXTREME]
extends = Aodv
description = "AODV + Flooding extremo (vários atacantes, pacotes grandes, pps alto)"

# Canal bem “apertado” (tente 2Mb/s; se seu rádio ignorar, mantenha 6Mb/s e compense com mais atacantes)
**.wlan[*].bitrate = 2Mbps
# Desliga RTS/CTS para pacotes grandes (mais colisões)
**.wlan[*].mac.rtsThreshold = 2200B

# Fluxo LEGÍTIMO (porta 5000)
*.source.numApps = 1
*.source.app[0].typename = "UdpBasicApp"
*.source.app[0].destAddresses = "destination"
*.source.app[0].destPort = 5000
*.source.app[0].sendInterval = 0.2s
*.source.app[0].messageLength = 256B
*.source.app[0].startTime = uniform(250s,251s)

*.destination.numApps = 2
*.destination.app[0].typename = "UdpSink"   # LEGÍTIMO
*.destination.app[0].localPort = 5000
*.destination.app[1].typename = "UdpSink"   # ATAQUE
*.destination.app[1].localPort = 5001

# Quatro ATACANTES muito agressivos (porta 5001)
*.node[5].numApps = 1
*.node[5].app[0].typename = "UdpBasicApp"
*.node[5].app[0].destAddresses = "destination"
*.node[5].app[0].destPort = 5001
*.node[5].app[0].sendInterval = 0.0002s    # ~5000 pps
*.node[5].app[0].messageLength = 1500B
*.node[5].app[0].startTime = uniform(250s,251s)

*.node[6].numApps = 1
*.node[6].app[0].typename = "UdpBasicApp"
*.node[6].app[0].destAddresses = "destination"
*.node[6].app[0].destPort = 5001
*.node[6].app[0].sendInterval = 0.0002s
*.node[6].app[0].messageLength = 1500B
*.node[6].app[0].startTime = uniform(250s,251s)

*.node[7].numApps = 1
*.node[7].app[0].typename = "UdpBasicApp"
*.node[7].app[0].destAddresses = "destination"
*.node[7].app[0].destPort = 5001
*.node[7].app[0].sendInterval = 0.0002s
*.node[7].app[0].messageLength = 1500B
*.node[7].app[0].startTime = uniform(250s,251s)

*.node[8].numApps = 1
*.node[8].app[0].typename = "UdpBasicApp"
*.node[8].app[0].destAddresses = "destination"
*.node[8].app[0].destPort = 5001
*.node[8].app[0].sendInterval = 0.0002s
*.node[8].app[0].messageLength = 1500B
*.node[8].app[0].startTime = uniform(250s,251s)

# (Opcional) Nós ocultos + destino congestionado
*.source.mobility.typename = "StationaryMobility"
*.source.mobility.initialX = 40m
*.source.mobility.initialY = 50m
*.destination.mobility.typename = "StationaryMobility"
*.destination.mobility.initialX = 60m
*.destination.mobility.initialY = 50m
*.node[5].mobility.typename = "StationaryMobility"
*.node[5].mobility.initialX = 62m
*.node[5].mobility.initialY = 52m
*.node[6].mobility.typename = "StationaryMobility"
*.node[6].mobility.initialX = 58m
*.node[6].mobility.initialY = 48m
*.node[7].mobility.typename = "StationaryMobility"
*.node[7].mobility.initialX = 64m
*.node[7].mobility.initialY = 54m
*.node[8].mobility.typename = "StationaryMobility"
*.node[8].mobility.initialX = 56m
*.node[8].mobility.initialY = 46m
**.transmitter.power = 1mW

# Gravação (LEGÍTIMO) — porta 5000
**.scalar-recording = true
**.vector-recording = true
#sim-time-limit = 120s
*.source.app[0].packetSent:count.scalar-recording = true
*.destination.app[0].packetReceived:count.scalar-recording = true
*.destination.app[0].endToEndDelay:mean.scalar-recording = true
*.destination.app[0].endToEndDelay:sum.scalar-recording = true
*.destination.app[0].endToEndDelay:count.scalar-recording = true
#*.destination.app[0].endToEndDelay:vector-recording = true

# Diagnóstico do ataque — porta 5001
*.node[5].app[0].packetSent:count.scalar-recording = true
*.node[6].app[0].packetSent:count.scalar-recording = true
*.node[7].app[0].packetSent:count.scalar-recording = true
*.node[8].app[0].packetSent:count.scalar-recording = true
*.destination.app[1].packetReceived:count.scalar-recording = true



